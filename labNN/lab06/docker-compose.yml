version: '3'
services:
  web:
    image: nginx
    ports:
      - "8083:80"
    volumes:
      - web-data:/usr/share/nginx/html
    depends_on:
      - db
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: labpassword
      POSTGRES_USER: labuser
      POSTGRES_DB: labdb
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  web-data:
  db-data:
